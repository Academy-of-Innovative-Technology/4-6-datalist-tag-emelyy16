<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>4.6 datalist tags</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <!--example form with a datalist-->
  <form name="example" action="#" method="POST">
      <label for="language">Select or type a language:</label>
      <input list="languages" name="language">
      <datalist id="languages">
          <option value="English">
          <option value="Spanish">
          <option value="Bangla">
          <option value="Chinese">
      </datalist>
      <br><br>
      <input type="submit">
  </form>

  <!--exercise 1-->
         <form name="sneakers" action="#" method="POST">
      <label for="sneakerheads">Select or type a sneakerhead:</label>
      <input list="sneakerbrands" name="sneakerbrands">

          <option value="Nikes">
          <option value="Adidas">
          <option value="New Balances">
          <option value="sketchers">
      </datalist>  
  <br><br>

  </form>

</body>

</html>
